name: Regenerate Derived Files

# Runs automatically on every push to dev that touches tsv/.
# Checks out KIParla/tools, then rebuilds linear-jefferson/, linear-orthographic/,
# and eaf/ from the updated TSVs and commits the results back to dev.
#
# The commit only targets derived directories, so it does not re-trigger this workflow.

on:
  push:
    branches:
      - dev
    paths:
      - 'tsv/**'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout module (dev)
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Checkout KIParla/tools
        uses: actions/checkout@v4
        with:
          repository: KIParla/tools
          path: _tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pympi-ling

      - name: Regenerate linear files
        run: |
          python _tools/tsv2formats.py \
            -i tsv/ \
            --out_jefferson linear-jefferson/ \
            --out_orthographic linear-orthographic/

      - name: Regenerate EAF files
        run: python _tools/tsv2eaf.py -i tsv/ -o eaf/

      - name: Commit regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add linear-jefferson/ linear-orthographic/ eaf/
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate derived files from updated TSVs"
            git push origin dev
          else
            echo "No changes to derived files."
          fi
